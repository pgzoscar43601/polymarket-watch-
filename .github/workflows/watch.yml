name: polymarket-watch

# Corre cada 5 minutos. Solo posible en repo público (free tier ilimitado).
# También permite trigger manual desde la pestaña Actions de GitHub.
on:
  schedule:
    - cron: "*/5 * * * *"   # cada 5 min UTC
  workflow_dispatch: {}

permissions:
  contents: write   # necesario para commitear el state/state.json actualizado

concurrency:
  group: polymarket-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # checkout completo, necesitamos poder commitear de vuelta
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_MIN_SIZE_USDC: ${{ vars.ALERT_MIN_SIZE_USDC || '50000' }}
          ALERT_NEW_MARKET_MIN_USDC: ${{ vars.ALERT_NEW_MARKET_MIN_USDC || '10000' }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python polymarket_watch.py

      - name: Commit updated state
        run: |
          set -e
          git config user.name  "polymarket-watch-bot"
          git config user.email "polymarket-watch-bot@users.noreply.github.com"
          # stage first (catches new untracked files like state.json on first run)
          git add state/
          if git diff --cached --quiet; then
            echo "no state changes to commit"
            exit 0
          fi
          git commit -m "chore(state): update snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"

          # Push con retry y rebase. El concurrency group del workflow ya evita
          # 2 runs simultáneos, pero un commit manual puede colisionar.
          for i in 1 2 3 4 5; do
            if git push 2>&1 | tee /tmp/push.log; then
              echo "push OK on attempt $i"
              exit 0
            fi
            echo "push failed (attempt $i), rebasing and retrying..."
            # Pequeño jitter aleatorio (1-5s) para evitar thundering herd
            sleep $((RANDOM % 5 + 1))
            # Pull con rebase: trae cambios remotos sin perder nuestro commit
            if ! git pull --rebase --autostash; then
              echo "rebase failed, aborting"
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
          done
          echo "push failed after 5 retries"
          exit 1
